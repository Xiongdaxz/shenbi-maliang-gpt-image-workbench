name: Release Packages

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish, for example v0.1.20. Leave empty to build the selected branch as artifacts only."
        required: false
        type: string
  push:
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  portable:
    name: Portable ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: ""
            executable: ShenbiMaliang.exe
            archive: 01-shenbi-maliang-windows-x64-portable.zip
          - name: windows-arm64
            os: windows-11-arm
            target: ""
            executable: ShenbiMaliang.exe
            archive: 02-shenbi-maliang-windows-arm64-portable.zip
          - name: linux-x64
            os: ubuntu-latest
            target: ""
            executable: shenbi-maliang
            archive: 03-shenbi-maliang-linux-x64-portable.zip
          - name: macos-x64
            os: macos-15-intel
            target: ""
            executable: shenbi-maliang
            archive: 04-shenbi-maliang-macos-x64-portable.zip
          - name: macos-arm64
            os: macos-latest
            target: ""
            executable: shenbi-maliang
            archive: 05-shenbi-maliang-macos-arm64-portable.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Compile portable executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "release-bin" | Out-Null
          $buildArgs = @(
            "build",
            "./server/portable.ts",
            "--compile",
            "--external=sharp",
            "--compile-autoload-package-json",
            "--outfile=release-bin/${{ matrix.executable }}"
          )
          if ("${{ matrix.target }}") {
            $buildArgs += "--target=${{ matrix.target }}"
          }
          if ("${{ matrix.name }}" -like "windows-*") {
            $buildArgs += @(
              "--windows-title=Shenbi Maliang",
              "--windows-description=Shenbi Maliang GPT Image Workbench",
              "--windows-publisher=Xiongdaxz"
            )
          }
          & bun @buildArgs

      - name: Create portable package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageRoot = "release/shenbi-maliang"
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          New-Item -ItemType Directory -Force -Path "$packageRoot/node_modules" | Out-Null
          Copy-Item -Path "release-bin/${{ matrix.executable }}" -Destination "$packageRoot/${{ matrix.executable }}" -Force
          Copy-Item -Path "dist" -Destination $packageRoot -Recurse -Force
          Copy-Item -Path "scripts" -Destination $packageRoot -Recurse -Force
          Copy-Item -Path "package.json", "bun.lock", "README.md", "README.en.md", "LICENSE" -Destination $packageRoot -Force

          $runtimeModules = @("sharp", "detect-libc", "semver")
          foreach ($module in $runtimeModules) {
            Copy-Item -Path "node_modules/$module" -Destination "$packageRoot/node_modules/$module" -Recurse -Force
          }
          Copy-Item -Path "node_modules/@img" -Destination "$packageRoot/node_modules/@img" -Recurse -Force

          @'
          # Shenbi Maliang Portable Package

          ## Windows

          Open this directory and double-click `ShenbiMaliang.exe`, then open http://127.0.0.1:8787 if the browser does not open automatically.

          ## Linux / macOS

          Open this directory and run:

          ```bash
          chmod +x ./shenbi-maliang
          ./shenbi-maliang
          ```

          Then open http://127.0.0.1:8787 if the browser does not open automatically.

          No Bun or npm install is required. Runtime data is created in `data/` next to the executable. Back up `data/` before upgrading.
          '@ | Set-Content -Encoding UTF8 -Path "$packageRoot/RUNNING.md"

      - name: Compress portable package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Compress-Archive -Path "release/shenbi-maliang" -DestinationPath "release/${{ matrix.archive }}" -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: release/${{ matrix.archive }}
          if-no-files-found: error

  source:
    name: Source run package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name || github.ref }}

      - name: Create source run package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageRoot = "release/shenbi-maliang-source"
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null

          $directories = @("server", "src", "public", "scripts", "docs")
          foreach ($directory in $directories) {
            if (Test-Path $directory) {
              Copy-Item -Path $directory -Destination $packageRoot -Recurse -Force
            }
          }

          $files = @(
            "package.json",
            "bun.lock",
            "README.md",
            "README.en.md",
            "LICENSE",
            "SECURITY.md",
            "CONTRIBUTING.md",
            "start-update.bat",
            "start.sh",
            "index.html",
            "vite.config.ts",
            "tsconfig.json",
            "tailwind.config.ts",
            "postcss.config.js"
          )
          foreach ($file in $files) {
            if (Test-Path $file) {
              Copy-Item -Path $file -Destination $packageRoot -Force
            }
          }
          if (Test-Path ".env.example") {
            Copy-Item -Path ".env.example" -Destination $packageRoot -Force
          }

          @'
          # Shenbi Maliang Source Run Package

          This package contains source files and does not include `node_modules`, `dist`, runtime data, or compiled executables.

          ## Requirements

          - Bun

          ## Run

          Windows:

          ```powershell
          .\start-update.bat
          ```

          Linux / macOS:

          ```bash
          bash ./start.sh
          ```

          Manual commands:

          ```bash
          bun install --frozen-lockfile
          bun run build
          bun run start
          ```

          Open:

          - User workspace: http://127.0.0.1:8787
          - Admin console: http://127.0.0.1:8787/config
          - Health check: http://127.0.0.1:8787/api/health

          Runtime data is created in `data/`. Back up `data/` before upgrading.
          '@ | Set-Content -Encoding UTF8 -Path "$packageRoot/RUNNING.md"

      - name: Compress source run package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Compress-Archive -Path "release/shenbi-maliang-source" -DestinationPath "release/06-shenbi-maliang-source-run.zip" -Force

      - name: Upload source artifact
        uses: actions/upload-artifact@v7
        with:
          name: 06-shenbi-maliang-source-run.zip
          path: release/06-shenbi-maliang-source-run.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release' || inputs.tag_name != ''
    needs:
      - portable
      - source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name || github.ref }}

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release notes
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tagName = "${{ github.event.release.tag_name || inputs.tag_name || github.ref_name }}"
          $lines = Get-Content -Path "docs/changelog.md"
          $headingPattern = "^##\s+$([regex]::Escape($tagName))(\s+-\s+.*)?\s*$"
          $start = -1

          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match $headingPattern) {
              $start = $i
              break
            }
          }

          if ($start -lt 0) {
            @(
              "## $tagName",
              "",
              "本版本暂无独立发布说明，请查看仓库中的 docs/changelog.md。"
            ) | Set-Content -Encoding UTF8 -Path "release-notes.md"
            return
          }

          $end = $lines.Count
          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^##\s+") {
              $end = $i
              break
            }
          }

          $section = @($lines[$start..($end - 1)])
          while ($section.Count -gt 0 -and [string]::IsNullOrWhiteSpace($section[-1])) {
            $section = @($section[0..($section.Count - 2)])
          }
          $section | Set-Content -Encoding UTF8 -Path "release-notes.md"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag_name || github.ref_name }}
          body_path: release-notes.md
          files: |
            release-assets/01-shenbi-maliang-windows-x64-portable.zip
            release-assets/02-shenbi-maliang-windows-arm64-portable.zip
            release-assets/03-shenbi-maliang-linux-x64-portable.zip
            release-assets/04-shenbi-maliang-macos-x64-portable.zip
            release-assets/05-shenbi-maliang-macos-arm64-portable.zip
            release-assets/06-shenbi-maliang-source-run.zip
